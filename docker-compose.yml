services:
  postgres:
    image: postgres:16-alpine
    container_name: task-board-postgres
    ports:
      - "5432:5432"
    env_file:
      - ./backend/.env.docker
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: task-board-backend
    env_file:
      - ./backend/.env.docker
    depends_on:
      - postgres
    ports:
      - "3000:3000"
      - "5555:5555"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    command: sh -c "pnpm install --force --no-frozen-lockfile && pnpm db:push && pnpm exec nest start --watch"

volumes:
  postgres_data:
  backend_node_modules:
