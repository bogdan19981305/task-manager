services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - backend/.env.prod.docker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  backend:
    build:
      context: ./backend
      target: production
    env_file:
      - backend/.env.prod.docker
    ports:
      - "3000:3000"
      - "5555:5555"
    depends_on:
      - postgres
    restart: always
    command: sh -c "if [ -d prisma/migrations ] && [ \"$(ls -A prisma/migrations 2>/dev/null)\" ]; then npx prisma migrate deploy; else npx prisma db push; fi && node dist/src/main"

volumes:
  postgres_data:
